<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HPE B2B commerce platform visual</title>
  <desc id="desc">Enterprise B2B commerce architecture with identity, bundles, delivery estimates, and recommendations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="line" x1="0" x2="1"><stop stop-color="#5eead4"/><stop offset="1" stop-color="#93c5fd"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity=".22" stroke="#64748b"><path d="M0 720h1600M0 590h1600M0 460h1600M0 330h1600"/><path d="M260 0v900M520 0v900M780 0v900M1040 0v900M1300 0v900"/></g>
  <rect x="570" y="255" width="460" height="310" rx="36" fill="#08111f" stroke="#5eead4" stroke-opacity=".45"/>
  <text x="655" y="350" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Hybris 2205</text>
  <text x="655" y="410" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="25">Enterprise commerce core</text>
  <g stroke="url(#line)" stroke-width="4" filter="url(#glow)">
    <path d="M570 330H265"/><path d="M1030 330h305"/><path d="M570 500H265"/><path d="M1030 500h305"/>
  </g>
  <g fill="#0f172a" stroke="#93c5fd" stroke-opacity=".42">
    <rect x="135" y="275" width="250" height="110" rx="22"/>
    <rect x="1215" y="275" width="250" height="110" rx="22"/>
    <rect x="135" y="445" width="250" height="110" rx="22"/>
    <rect x="1215" y="445" width="250" height="110" rx="22"/>
  </g>
  <g fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">
    <text x="190" y="340">OKTA SSO</text>
    <text x="1265" y="340">Bundles</text>
    <text x="178" y="510">Lead-Time</text>
    <text x="1245" y="510">Recommendations</text>
