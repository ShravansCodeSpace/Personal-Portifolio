<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DENTSPLY Sirona global B2C platform visual</title>
  <desc id="desc">Modular B2C commerce platform visual with data modelling, jobs, APIs, and release flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0c0a09"/><stop offset="1" stop-color="#171717"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#a7f3d0"/><stop offset="1" stop-color="#f4dcc9"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="240" fill="none" stroke="#43474a" stroke-width="2"/>
  <circle cx="800" cy="450" r="150" fill="#111" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
  <text x="675" y="435" fill="#e4e2e2" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Hybris 1905</text>
  <text x="668" y="485" fill="#c4c7ca" font-family="Inter, Arial, sans-serif" font-size="22">Global B2C platform</text>
  <g fill="#171717" stroke="#f4dcc9" stroke-opacity=".38">
    <rect x="170" y="190" width="300" height="130" rx="22"/>
    <rect x="1130" y="190" width="300" height="130" rx="22"/>
    <rect x="170" y="580" width="300" height="130" rx="22"/>
    <rect x="1130" y="580" width="300" height="130" rx="22"/>
  </g>
  <g stroke="url(#accent)" stroke-width="4" filter="url(#glow)">
    <path d="M470 255c125 20 205 80 260 195"/>
    <path d="M1130 255c-125 20-205 80-260 195"/>
    <path d="M470 645c125-20 205-80 260-195"/>
    <path d="M1130 645c-125-20-205-80-260-195"/>
  </g>
  <g fill="#e4e2e2" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">
    <text x="230" y="265">Data Models</text>
    <text x="1190" y="265">OCC APIs</text>
