<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Samsung SIEL ShopApp commerce orchestration visual</title>
  <desc id="desc">Dark enterprise commerce dashboard with mobile app, order lifecycle, notifications, and API connections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050608"/>
      <stop offset="0.55" stop-color="#0b1216"/>
      <stop offset="1" stop-color="#131314"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#48e5ff"/>
      <stop offset="1" stop-color="#bdc8d0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M200 665h1200M280 250h1040M360 520h880" stroke="#24343a" stroke-width="2"/>
  <rect x="605" y="165" width="390" height="570" rx="52" fill="#090b0f" stroke="#5f767e" stroke-opacity=".45" stroke-width="3"/>
  <rect x="650" y="235" width="300" height="92" rx="22" fill="#101820" stroke="#48e5ff" stroke-opacity=".45"/>
  <rect x="650" y="365" width="300" height="250" rx="28" fill="#0d1218" stroke="#bdc8d0" stroke-opacity=".2"/>
  <circle cx="800" cy="680" r="30" fill="none" stroke="#48e5ff" stroke-opacity=".65" stroke-width="4"/>
  <g fill="none" stroke="url(#cyan)" stroke-width="4" filter="url(#glow)">
    <path d="M650 410h-210v-96H305"/>
    <path d="M950 420h218v-90h140"/>
    <path d="M650 535H455v88H300"/>
    <path d="M950 540h190v98h166"/>
  </g>
  <g fill="#111a20" stroke="#48e5ff" stroke-opacity=".35">
    <rect x="190" y="260" width="250" height="108" rx="18"/>
    <rect x="1160" y="275" width="250" height="108" rx="18"/>
    <rect x="190" y="575" width="250" height="108" rx="18"/>
    <rect x="1160" y="590" width="250" height="108" rx="18"/>
  </g>
  <g fill="#bdc8d0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">
    <text x="230" y="324">OCC APIs</text>
    <text x="1200" y="339">SSO</text>
    <text x="230" y="639">MoEngage</text>
    <text x="1200" y="654">Rollouts</text>
  </g>
  <g fill="#48e5ff">
    <circle cx="440" cy="314" r="8"/><circle cx="1160" cy="330" r="8"/><circle cx="440" cy="623" r="8"/><circle cx="1160" cy="638" r="8"/>
